services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: whoa
      POSTGRES_USER: whoa
      POSTGRES_PASSWORD: whoa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whoa -d whoa"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    env_file: [.env]
    depends_on:
      db: { condition: service_healthy }
    command: alembic upgrade head

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"


volumes:
  postgres_data:
