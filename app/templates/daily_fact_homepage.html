
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; }

  .page {
    min-height: 96vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 2.5rem 3rem;
    font-family: var(--font-sans);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    font-weight: 500;
  }

  .date-badge {
    font-size: 12px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.04em;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 540px;
    margin: 0 auto;
    width: 100%;
    gap: 2rem;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    font-weight: 500;
  }

  .tag-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--color-text-tertiary);
    opacity: 0.5;
  }

  .fact-text {
    font-family: var(--font-serif);
    font-size: 22px;
    line-height: 1.65;
    color: var(--color-text-primary);
    font-weight: 400;
  }

  .fact-text em {
    font-style: italic;
    color: var(--color-text-secondary);
  }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--color-border-secondary);
  }

  .source-line {
    font-size: 12px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.03em;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--color-border-secondary);
    cursor: pointer;
    transition: background 0.2s;
  }

  .dot.active {
    background: var(--color-text-secondary);
    width: 16px;
    border-radius: 3px;
  }

  .next-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--color-text-tertiary);
    cursor: pointer;
    letter-spacing: 0.04em;
    border: none;
    background: none;
    padding: 0;
    transition: color 0.2s;
  }

  .next-btn:hover { color: var(--color-text-primary); }

  .loading-state {
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: pulse 1.8s ease-in-out infinite;
  }

  .skel {
    height: 14px;
    border-radius: 4px;
    background: var(--color-border-tertiary);
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .fade-in {
    animation: fadeIn 0.6s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .category-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--color-border-tertiary);
    font-size: 11px;
    color: var(--color-text-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }
</style>

<div class="page">
  <div class="header">
    <span class="logo">Факт дня</span>
    <span class="date-badge" id="today-date"></span>
  </div>

  <div class="main">
    <div style="display:flex; align-items:center; gap: 10px;">
      <span class="category-pill" id="category-label"><i class="ti ti-bulb" style="font-size:12px" aria-hidden="true"></i> загрузка</span>
    </div>

    <div id="fact-area">
      <div class="loading-state">
        <div class="skel" style="width:90%"></div>
        <div class="skel" style="width:100%"></div>
        <div class="skel" style="width:75%"></div>
      </div>
    </div>

    <div class="divider" id="divider" style="opacity:0"></div>
    <div class="source-line" id="source-line" style="opacity:0"></div>
  </div>

  <div class="footer">
    <div class="nav-dots" id="nav-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <button class="next-btn" id="next-btn" style="opacity:0">
      Ещё факт <i class="ti ti-arrow-right" style="font-size:13px" aria-hidden="true"></i>
    </button>
  </div>
</div>

<script>
const facts = [
  {
    text: "Осьминоги имеют три сердца и голубую кровь — из-за меди в гемоцианине, который переносит кислород вместо железа.",
    category: "Биология",
    icon: "ti-flask",
    source: "Морская биология · Cephalopoda"
  },
  {
    text: "В среднем человек принимает около 35 000 решений в день — большинство из них бессознательно, за доли секунды.",
    category: "Психология",
    icon: "ti-brain",
    source: "Когнитивная наука · Cornell University"
  },
  {
    text: "Самая длинная известная река в мире — Нил, но учёные до сих пор спорят о её истоке: существуют конкурирующие экспедиции и замеры.",
    category: "География",
    icon: "ti-map",
    source: "Физическая география · USGS"
  },
  {
    text: "Мёд не портится. В египетских гробницах находили мёду возрастом более 3000 лет — и он оставался пригодным в пищу.",
    category: "История",
    icon: "ti-hourglass",
    source: "Египтология · National Geographic"
  },
  {
    text: "Звук во Вселенной не может распространяться в вакууме — но в некоторых туманностях газ настолько плотен, что волны давления всё же существуют.",
    category: "Астрофизика",
    icon: "ti-stars",
    source: "Астрофизика · NASA"
  }
];

let current = 0;

function setDate() {
  const d = new Date();
  const opts = { day: 'numeric', month: 'long', year: 'numeric' };
  document.getElementById('today-date').textContent = d.toLocaleDateString('ru-RU', opts);
}

function showFact(idx) {
  const f = facts[idx];
  const area = document.getElementById('fact-area');
  const divider = document.getElementById('divider');
  const sourceLine = document.getElementById('source-line');
  const catLabel = document.getElementById('category-label');
  const nextBtn = document.getElementById('next-btn');

  area.innerHTML = '';
  divider.style.opacity = '0';
  sourceLine.style.opacity = '0';
  nextBtn.style.opacity = '0';

  catLabel.innerHTML = `<i class="ti ${f.icon}" style="font-size:12px" aria-hidden="true"></i> ${f.category}`;

  setTimeout(() => {
    const p = document.createElement('p');
    p.className = 'fact-text fade-in';
    p.textContent = f.text;
    area.appendChild(p);
    divider.style.opacity = '1';
    divider.style.transition = 'opacity 0.5s 0.3s';
    sourceLine.textContent = f.source;
    sourceLine.style.opacity = '1';
    sourceLine.style.transition = 'opacity 0.5s 0.4s';
    nextBtn.style.opacity = '1';
    nextBtn.style.transition = 'opacity 0.4s 0.5s';
  }, 300);

  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
}

document.getElementById('next-btn').addEventListener('click', () => {
  current = (current + 1) % facts.length;
  showFact(current);
});

document.querySelectorAll('.dot').forEach((dot, i) => {
  dot.addEventListener('click', () => {
    current = i;
    showFact(current);
  });
});

setDate();
setTimeout(() => showFact(0), 600);
</script>
