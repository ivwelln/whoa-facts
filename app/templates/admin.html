<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка · WHOA facts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- ===== Загрузочный плейсхолдер (пока JS не определил состояние авторизации) ===== -->
    <div class="auth-loading" id="auth-loading">
        <div class="auth-loading-spinner" aria-hidden="true"></div>
    </div>

    <!-- ===== Экран логина ===== -->
    <main class="auth-screen" id="auth-screen" hidden>
        <div class="auth-card">
            <h1 class="auth-title">ADMIN | PANEL</h1>
            <p class="auth-subtitle">Введи токен, чтобы продолжить</p>

            <form class="auth-form" id="auth-form" autocomplete="off">
                <input
                    type="password"
                    class="auth-input"
                    id="auth-input"
                    placeholder="Токен"
                    autocomplete="current-password"
                    spellcheck="false"
                    required
                >
                <button type="submit" class="admin-btn admin-btn--primary auth-submit" id="auth-submit">
                    Войти
                </button>
                <div class="auth-error" id="auth-error" hidden></div>
            </form>

            <a class="auth-back" href="/">← На главную</a>
        </div>
    </main>

    <!-- ===== Сама админ-панель ===== -->
    <main class="admin-page" id="admin-panel" hidden>
        <header class="admin-header">
            <a class="back-link admin-back" href="/">
                <span class="back-link-arrow">←</span>
                <span>На главную</span>
            </a>
            <h1 class="admin-title">ADMIN | PANEL</h1>
            <p class="admin-subtitle">Управление контентом, просмотр статистики, администрирование</p>
            <button class="back-link admin-logout" id="logout-btn" type="button" title="Выйти из админки">
                <span>Выйти</span>
                <span class="back-link-arrow" aria-hidden="true">→</span>
            </button>
        </header>

        <section class="admin-section">
            <h2 class="admin-section-title">Факты</h2>

            <div class="admin-grid">
                <div class="admin-list-pane">
                    <input
                        class="admin-search"
                        id="search"
                        type="search"
                        placeholder="Поиск"
                        autocomplete="off"
                        spellcheck="false"
                    >

                    <select class="admin-filter" id="topic-filter" aria-label="Фильтр по теме">
                        <option value="">Все темы</option>
                    </select>

                    <div class="admin-list" id="list" role="listbox" aria-label="Список фактов"></div>

                    <div class="admin-list-footer">
                        <span class="admin-counter" id="counter">Всего: —</span>
                        <button class="admin-btn admin-btn--primary" id="generate-btn" type="button">
                            Сгенерировать новый
                        </button>
                    </div>
                </div>

                <aside class="admin-detail" id="detail" aria-live="polite">
                    <div class="admin-empty">Выбери факт слева</div>
                </aside>
            </div>
        </section>
    </main>

    <script src="/static/js/admin.js"></script>
</body>
</html>
