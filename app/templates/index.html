<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOA facts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="page">
        <section class="fact">
            <div class="fact-category" id="category">&nbsp;</div>

            <div class="fact-text" id="fact-text">

                    <span class="skeleton-line"></span>
                    <span class="skeleton-line"></span>
                    <span class="skeleton-line short"></span>

            </div>

            <div class="attribution">
                <div class="attribution-line" aria-hidden="true"></div>
                <div class="attribution-text" id="source">Сгенерировано нейросетью — YandexGPT. Могут быть ошибки.</div>
            </div>
        </section>

        <section class="brand">
            <h1 class="brand-title">WHOA facts</h1>
            <a class="more-link" href="/history">Больше фактов</a>
        </section>
    </main>

    <script src="/static/js/main.js"></script>

</html>
